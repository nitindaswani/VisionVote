{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Verification</title>

    <link rel="stylesheet" href="{% static 'css/accounts/face_login.css' %}" />
  </head>
  <body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    {% include 'navbar.html' %}

    <main class="container">
      <div class="verification-card glass">
        <div class="icon">👁️</div>

        <h1>Face Verification</h1>

        <p class="subtitle">
          Please look at the camera and blink once for verification.
        </p>

        <div class="camera-wrapper">
          <video id="video" autoplay playsinline muted></video>
        </div>

        <canvas
          id="captureCanvas"
          width="1280"
          height="720"
          style="display: none"
        >
        </canvas>

        <div class="status-box">
          <h3 id="blinkStatus">Please blink once</h3>
        </div>
      </div>
    </main>

    {% include 'footer.html' %}

    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <!-- KEEP YOUR ORIGINAL SCRIPT EXACTLY AS IT IS -->
    <script>
      let blinkDetected = false;
      let closedFrames = 0;

      const EYE_THRESHOLD = 0.22;

      function distance(a, b) {
        return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
      }

      function EAR(landmarks, eye) {
        const A = distance(landmarks[eye[1]], landmarks[eye[5]]);
        const B = distance(landmarks[eye[2]], landmarks[eye[4]]);
        const C = distance(landmarks[eye[0]], landmarks[eye[3]]);
        return (A + B) / (2 * C);
      }

      const LEFT_EYE = [33, 160, 158, 133, 153, 144];
      const RIGHT_EYE = [362, 385, 387, 263, 373, 380];

      const faceMesh = new FaceMesh({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });

      faceMesh.onResults((results) => {
        if (blinkDetected) return;

        if (
          !results.multiFaceLandmarks ||
          results.multiFaceLandmarks.length === 0
        )
          return;

        const landmarks = results.multiFaceLandmarks[0];

        const leftEAR = EAR(landmarks, LEFT_EYE);
        const rightEAR = EAR(landmarks, RIGHT_EYE);

        const ear = (leftEAR + rightEAR) / 2;

        if (ear < EYE_THRESHOLD) {
          closedFrames++;
        } else {
          if (closedFrames >= 3) {
            blinkDetected = true;

            document.getElementById("blinkStatus").innerText =
              "Blink Verified ✓";

            fetch("/verify-blink/")
              .then((r) => r.json())
              .then((data) => {
                if (data.success) {
                  setTimeout(() => {
                    captureFace();
                  }, 1000);
                }
              });
          }

          closedFrames = 0;
        }
      });

      const video = document.getElementById("video");

      const camera = new Camera(video, {
        onFrame: async () => {
          await faceMesh.send({
            image: video,
          });
        },
        width: 1280,
        height: 720,
      });

      camera.start();

      function captureFace() {
        const canvas = document.getElementById("captureCanvas");

        const ctx = canvas.getContext("2d");

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const image = canvas.toDataURL("image/jpeg", 1.0);

        fetch("/verify-face/", {
          method: "POST",
          body: new URLSearchParams({
            image: image,
          }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.success) {
              document.getElementById("blinkStatus").innerText =
                "Face Verified ✓";

              window.location.href = "/dashboard/";
            } else {
              alert(data.message);

              blinkDetected = false;

              closedFrames = 0;

              document.getElementById("blinkStatus").innerText =
                "Please blink once again";
            }
          });
      }
    </script>
  </body>
</html>
